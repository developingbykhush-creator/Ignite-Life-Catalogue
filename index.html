      document.getElementById('results-count').textContent = `Showing ${filtered.length} of ${products.length} items`;
      const template = document.getElementById('card-template');

      filtered.forEach((p) => {
        const originalIdx = products.indexOf(p);
        const imgs = productImages[originalIdx % productImages.length];

        card.querySelector('.card-title').textContent = p.name;
        const img1 = card.querySelector('.card-img-1');
        const img2 = card.querySelector('.card-img-2');
        const img3 = card.querySelector('.card-img-3');
        img1.src = imgs[0]; img1.alt = p.name + ' - view 1';
        img2.src = imgs[1]; img2.alt = p.name + ' - view 2';
        img3.src = imgs[2]; img3.alt = p.name + ' - view 3';

        const colors = conditionColors[p.condition] || { bg: 'bg-gray-500/20', text: 'text-gray-400' };
        const tags = card.querySelector('.card-tags');
        tags.innerHTML = `<span class="text-[11px] px-2 py-0.5 rounded bg-[#DFFF00]/10 text-[#DFFF00] font-medium">${p.brand}</span><span class="text-[11px] px-2 py-0.5 rounded ${colors.bg} ${colors.text} font-medium">${p.condition}</span>`;

        const details = card.querySelector('.card-details');
        details.innerHTML = `<div class="flex justify-between"><span class="text-gray-500">Qty</span><span class="text-gray-300">${p.qty}</span></div>`;

        card.querySelector('.card-price').textContent = p.price;
        card.querySelector('.card-cta').href = `https://wa.me/${PHONE}?text=${encodeURIComponent('Hi, I am interested in: ' + p.name)}`;

      // Setup carousels
      grid.querySelectorAll('.carousel-container').forEach(container => {
        const track = container.querySelector('.carousel-track');
        const parent = container.closest('.group');
        const prevBtn = parent.querySelector('.carousel-prev');
        const nextBtn = parent.querySelector('.carousel-next');
        const dots = parent.querySelectorAll('.dot');
        let current = 0;
        function go(i) {
          current = i;
          track.style.transform = `translateX(-${i * 100}%)`;
          dots.forEach((d, idx) => { d.classList.toggle('bg-[#DFFF00]', idx === i); d.classList.toggle('bg-gray-500', idx !== i); });
        }
        prevBtn.addEventListener('click', () => go(current === 0 ? 2 : current - 1));
        nextBtn.addEventListener('click', () => go(current === 2 ? 0 : current + 1));
        dots.forEach(d => d.addEventListener('click', () => go(parseInt(d.dataset.index))));
      });

      lucide.createIcons();
    }

    function applyFilters() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const brand = brandSelect.value;
      const condition = conditionSelect.value;
      const filtered = products.filter(p => {
        if (search && !p.name.toLowerCase().includes(search)) return false;
        if (brand && p.brand !== brand) return false;
        if (condition && p.condition !== condition) return false;
        return true;
      });
      renderProducts(filtered);
    }

    document.getElementById('search-input').addEventListener('input', applyFilters);
    brandSelect.addEventListener('change', applyFilters);
    conditionSelect.addEventListener('change', applyFilters);

    renderProducts(products);
