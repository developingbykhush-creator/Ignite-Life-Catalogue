    function formatPrice(p) {
      if (!p || p === 'None') return 'Price on Request';
      if (p.includes('per kg')) return '₹' + p;
      const num = parseInt(p);
      if (isNaN(num)) return '₹' + p;

        const details = card.querySelector('.card-details');
        details.innerHTML = `<div class="flex justify-between"><span class="text-gray-500">Qty</span><span class="text-gray-300">${p.qty}</span></div>`;

        const dots = parent.querySelectorAll('.dot');
        let current = 0;

        function go(i) {
          current = i;
          track.style.transform = `translateX(-${i * 100}%)`;
          dots.forEach((d, idx) => { d.classList.toggle('bg-[#DFFF00]', idx === i); d.classList.toggle('active', idx === i); d.classList.toggle('bg-gray-500', idx !== i); });

        nextBtn.addEventListener('click', () => go(current === 2 ? 0 : current + 1));
        dots.forEach(d => d.addEventListener('click', () => go(parseInt(d.dataset.index))));

    function applyFilters() {

        if (condition && p.condition !== condition) return false;
        return true;
      });
      renderProducts(filtered);
    }
